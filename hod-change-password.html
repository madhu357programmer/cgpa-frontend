<!DOCTYPE html>
<html>
<head>
<title>HOD - Change Password</title>
<style>
body{margin:0;font-family:Inter;background:#f4f7fb}
.topbar{background:#0b5ed7;color:white;padding:15px 40px;font-size:20px;font-weight:600}
.container{display:flex;height:calc(100vh - 60px)}
.sidebar{width:220px;background:#0a58ca;color:white;padding:20px}
.menu a{display:block;color:white;text-decoration:none;padding:12px;border-radius:6px;margin-bottom:10px}
.menu a:hover{background:rgba(255,255,255,0.15)}
.main{flex:1;display:flex;justify-content:center;align-items:center}
.card{background:white;width:420px;padding:30px;border-radius:12px;box-shadow:0 8px 20px rgba(0,0,0,.08)}
.card h3{margin-top:0;color:#0b5ed7}
input{width:100%;padding:12px;margin:10px 0;border-radius:6px;border:1px solid #ccc;box-sizing:border-box}
button{width:100%;background:#0b5ed7;color:white;border:none;padding:12px;border-radius:6px;font-weight:600;cursor:pointer;margin-top:10px}
button:hover{background:#084298}
#msg{margin-top:15px;font-weight:600}
</style>
</head>
<body>

<div class="topbar">HOD Portal – Change Password</div>

<div class="container">
  <div class="sidebar">
    <div class="menu">
      <a href="hod.html">Create Staff</a>
      <a href="view-staff.html">View Staff</a>
      <a href="reset-password.html">Reset Staff Password</a>
      <a href="hod-cgpa.html">View CGPA Data</a>
      <a href="hod-change-password.html">Change My Password</a>
      <a href="#" onclick="logout()">Logout</a>
    </div>
  </div>

  <div class="main">
    <div class="card">
      <h3>Change My Password</h3>
      <input id="currentPass" type="password" placeholder="Current Password">
      <input id="newPass" type="password" placeholder="New Password">
      <input id="confirmPass" type="password" placeholder="Confirm New Password">
      <button onclick="changePassword()">Update Password</button>
      <p id="msg"></p>
    </div>
  </div>
</div>

<script>
async function changePassword() {
  const current = document.getElementById('currentPass').value;
  const newP = document.getElementById('newPass').value;
  const confirm = document.getElementById('confirmPass').value;
  const msg = document.getElementById('msg');

  if (!current || !newP || !confirm) {
    msg.textContent = "All fields are required!";
    msg.style.color = "red";
    return;
  }

  if (newP !== confirm) {
    msg.textContent = "New passwords do not match!";
    msg.style.color = "red";
    return;
  }

  if (newP.length < 6) {
    msg.textContent = "Password must be at least 6 characters!";
    msg.style.color = "red";
    return;
  }

  try {
      const res = await fetch(`${SERVER_URL}/auth/reset-own-password`, {
      method: "POST",
      credentials: "include",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        currentPassword: current,
        newPassword: newP
      })
    });

    const data = await res.json();
    if (res.ok) {
      msg.textContent = "✅ Password updated successfully!";
      msg.style.color = "green";
      document.getElementById('currentPass').value = '';
      document.getElementById('newPass').value = '';
      document.getElementById('confirmPass').value = '';
    } else {
      msg.textContent = data.message || "Error updating password";
      msg.style.color = "red";
    }
  } catch(e) {
    msg.textContent = "Could not connect to server";
    msg.style.color = "red";
  }
}
const SERVER_URL = 'https://cgpa-backend-dcn1.onrender.com';

async function logout() {
  await fetch(`${SERVER_URL}/auth/logout`, {
    method: "POST",
    credentials: "include"
  });
  window.location.href = "mainlogin.html";
}
</script>
</body>
</html>
